name: Two Jobs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Start checks
        run: echo "Running checks..."

      - name: Wait
        run: sleep 5

      - name: Done
        run: echo "Checks passed!"

  deploy:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Deploy
        run: echo "Deploying..."

      - name: Complete
        run: echo "Deploy complete!"
